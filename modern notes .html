<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Modern Notebook</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      padding: 24px 20px 40px;
      min-height: 100vh;
      transition: background 0.3s ease;
    }

    /* Light mode (default) */
    body.light {
      background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
    }
    body.light .app-container {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(4px);
    }
    body.light .note-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.02);
    }
    body.light .note-card:hover {
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.98);
    }
    body.light .header-title {
      color: #0f172a;
    }
    body.light .search-input {
      background: rgba(255,255,255,0.8);
      border: 1px solid #e2e8f0;
      color: #1e293b;
    }
    body.light .tag-filter {
      background: white;
      border: 1px solid #e2e8f0;
      color: #334155;
    }

    /* Dark mode */
    body.dark {
      background: radial-gradient(circle at 10% 20%, #020617, #0b1120);
    }
    body.dark .app-container {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(5px);
    }
    body.dark .note-card {
      background: rgba(30, 41, 59, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
    }
    body.dark .note-card:hover {
      background: rgba(51, 65, 85, 0.85);
      border-color: rgba(56, 189, 248, 0.3);
    }
    body.dark .note-title, body.dark .note-content {
      color: #f1f5f9;
    }
    body.dark .search-input {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
    }
    body.dark .tag-filter {
      background: #1e293b;
      border-color: #334155;
      color: #cbd5e1;
    }
    body.dark .header-title {
      color: white;
    }

    /* layout */
    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      border-radius: 2rem;
      padding: 20px 24px 40px;
      transition: all 0.3s;
    }

    /* header */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-title {
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .badge {
      font-size: 0.75rem;
      background: rgba(56, 189, 248, 0.2);
      padding: 4px 10px;
      border-radius: 40px;
      color: #38bdf8;
      font-weight: 500;
    }

    /* search + filters */
    .search-section {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      flex: 1;
      justify-content: flex-end;
    }
    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border-radius: 60px;
      font-size: 0.9rem;
      outline: none;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      font-weight: 500;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      opacity: 0.6;
    }
    .filter-group {
      display: flex;
      gap: 8px;
    }
    .tag-filter {
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      background: rgba(255,255,240,0.6);
      transition: all 0.2s;
    }
    .tag-filter.active {
      background: #38bdf8;
      color: white;
      border-color: #38bdf8;
    }
    .theme-toggle {
      background: rgba(100, 100, 120, 0.2);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 60px;
      font-size: 1.4rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.2s;
    }

    /* notes grid */
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 28px;
      transition: all 0.2s;
    }

    /* note card */
    .note-card {
      border-radius: 28px;
      padding: 1.25rem;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: grab;
      user-select: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(8px);
    }
    .note-card.dragging {
      opacity: 0.5;
      cursor: grabbing;
      transform: scale(0.98);
    }
    .note-card.drag-over {
      border: 2px solid #38bdf8;
      background: rgba(56, 189, 248, 0.1);
    }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .pin-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.6;
      transition: 0.15s;
      padding: 4px;
    }
    .pin-btn.active {
      opacity: 1;
      color: #facc15;
      transform: scale(1.05);
    }
    .delete-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.5;
      transition: 0.15s;
    }
    .delete-btn:hover {
      opacity: 1;
      color: #ef4444;
    }
    .note-title {
      font-weight: 700;
      font-size: 1.2rem;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      padding: 4px 0;
      resize: none;
      font-family: inherit;
    }
    .note-content {
      font-size: 0.9rem;
      line-height: 1.45;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      font-family: inherit;
      width: 100%;
    }
    .note-meta {
      font-size: 0.7rem;
      opacity: 0.5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    .tag-selector {
      background: rgba(0,0,0,0.05);
      border-radius: 20px;
      padding: 4px 8px;
      font-size: 0.7rem;
      border: none;
      outline: none;
      cursor: pointer;
    }
    body.dark .tag-selector {
      background: rgba(255,255,255,0.1);
      color: #cbd5e1;
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #38bdf8;
      width: 60px;
      height: 60px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      border: none;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(56, 189, 248, 0.4);
      transition: transform 0.2s, background 0.2s;
      z-index: 100;
    }
    .fab:hover {
      transform: scale(1.05);
      background: #0ea5e9;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.7;
      font-style: italic;
    }

    /* animation */
    @keyframes fadeScaleIn {
      0% { opacity: 0; transform: scale(0.92) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .note-card {
      animation: fadeScaleIn 0.25s ease-out forwards;
    }
    .delete-animation {
      animation: fadeShrink 0.2s forwards !important;
    }
    @keyframes fadeShrink {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.85); display: none; }
    }

    /* responsive */
    @media (max-width: 640px) {
      body { padding: 16px; }
      .notes-grid { gap: 16px; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .search-section { width: 100%; }
    }
  </style>
</head>
<body class="light">
<div class="app-container">
  <div class="top-bar">
    <div class="brand">
      <h1 class="header-title"> Notes</h1>
      <div class="badge">✨ fluid studio</div>
    </div>
    <div class="search-section">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search title or content...">
      </div>
      <div class="filter-group" id="filterTagsContainer"></div>
      <button class="theme-toggle" id="themeToggleBtn" aria-label="Dark/Light mode">🌙</button>
    </div>
  </div>

  <div class="notes-grid" id="notesGrid"></div>
  <div id="emptyMessage" class="empty-state" style="display: none;">✨ No notes yet — tap the + button to start writing</div>
</div>
<button class="fab" id="addNoteBtn" aria-label="Add note">+</button>

<script>
  // ---------- App State ----------
  let notes = [];           // { id, title, content, pinned, tags, createdAt, updatedAt }
  let searchQuery = "";
  let activeTagFilter = "all";   // "all" or specific tag
  let dragSourceIndex = null;
  let currentTheme = "light";

  // DOM elements
  const notesGrid = document.getElementById("notesGrid");
  const emptyMsgDiv = document.getElementById("emptyMessage");
  const searchInput = document.getElementById("searchInput");
  const themeToggle = document.getElementById("themeToggleBtn");
  const addBtn = document.getElementById("addNoteBtn");
  const filterContainer = document.getElementById("filterTagsContainer");

  // ---------- Helpers ----------
  function saveToLocalStorage() {
    localStorage.setItem("nimbus_notes", JSON.stringify(notes));
    localStorage.setItem("nimbus_theme", currentTheme);
  }

  function loadFromLocalStorage() {
    const stored = localStorage.getItem("nimbus_notes");
    if (stored) {
      notes = JSON.parse(stored);
      // ensure legacy notes have tags
      notes = notes.map(n => ({ ...n, tags: n.tags || (Math.random() > 0.6 ? "idea" : "general"), updatedAt: n.updatedAt || Date.now() }));
    } else {
      // sample notes to feel alive
      notes = [
        { id: "1", title: "Welcome to Notes ✨", content: "Drag me anywhere! Pin notes, search, dark mode. Smooth animations included.", pinned: true, tags: "welcome", createdAt: Date.now() - 100000, updatedAt: Date.now() },
        { id: "2", title: "Drag & Drop", content: "Reorder cards effortlessly. Visual feedback and smooth transitions.", pinned: false, tags: "feature", createdAt: Date.now() - 80000, updatedAt: Date.now() },
        { id: "3", title: "Auto-save", content: "Edit any note, changes are saved instantly to localStorage.", pinned: false, tags: "general", createdAt: Date.now() - 50000, updatedAt: Date.now() },
        { id: "4", title: "Focus mode", content: "Click on note card → expand? just edit inline. Type anywhere.", pinned: false, tags: "idea", createdAt: Date.now() - 20000, updatedAt: Date.now() }
      ];
    }
    const storedTheme = localStorage.getItem("nimbus_theme");
    if (storedTheme) currentTheme = storedTheme;
    applyTheme();
  }

  function applyTheme() {
    document.body.classList.remove("light", "dark");
    document.body.classList.add(currentTheme);
    themeToggle.innerHTML = currentTheme === "light" ? "🌙" : "☀️";
  }

  function toggleTheme() {
    currentTheme = currentTheme === "light" ? "dark" : "light";
    applyTheme();
    saveToLocalStorage();
  }

  // generate unique tags from notes
  function getAllUniqueTags() {
    const tagsSet = new Set();
    notes.forEach(note => { if (note.tags) tagsSet.add(note.tags); });
    return Array.from(tagsSet).sort();
  }

  function renderTagFilters() {
    const tags = getAllUniqueTags();
    let html = `<button class="tag-filter ${activeTagFilter === 'all' ? 'active' : ''}" data-tag="all">📌 All</button>`;
    tags.forEach(tag => {
      html += `<button class="tag-filter ${activeTagFilter === tag ? 'active' : ''}" data-tag="${tag}">🏷️ ${tag}</button>`;
    });
    filterContainer.innerHTML = html;
    document.querySelectorAll(".tag-filter").forEach(btn => {
      btn.addEventListener("click", (e) => {
        activeTagFilter = btn.getAttribute("data-tag");
        renderTagFilters();
        renderNotes();
      });
    });
  }

  // filter & search logic
  function getFilteredNotes() {
    let filtered = [...notes];
    // search (title or content)
    if (searchQuery.trim() !== "") {
      const lowerQuery = searchQuery.toLowerCase();
      filtered = filtered.filter(n => n.title.toLowerCase().includes(lowerQuery) || n.content.toLowerCase().includes(lowerQuery));
    }
    // tag filter
    if (activeTagFilter !== "all") {
      filtered = filtered.filter(n => n.tags === activeTagFilter);
    }
    // sort pinned first, then by updatedAt desc
    filtered.sort((a,b) => {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return b.updatedAt - a.updatedAt;
    });
    return filtered;
  }

  // auto-save handlers (inline editing)
  function updateNoteField(id, field, value) {
    const note = notes.find(n => n.id === id);
    if (note) {
      note[field] = value;
      note.updatedAt = Date.now();
      saveToLocalStorage();
      renderNotes();  // re-render to sync meta + tags, but keep filters
    }
  }

  function deleteNote(id) {
    const noteElement = document.querySelector(`.note-card[data-id='${id}']`);
    if (noteElement) {
      noteElement.classList.add("delete-animation");
      setTimeout(() => {
        notes = notes.filter(n => n.id !== id);
        saveToLocalStorage();
        renderNotes();
      }, 180);
    } else {
      notes = notes.filter(n => n.id !== id);
      saveToLocalStorage();
      renderNotes();
    }
  }

  function togglePin(id) {
    const note = notes.find(n => n.id === id);
    if (note) {
      note.pinned = !note.pinned;
      note.updatedAt = Date.now();
      saveToLocalStorage();
      renderNotes();
    }
  }

  function updateTagsForNote(id, newTag) {
    const note = notes.find(n => n.id === id);
    if (note && newTag && newTag !== "") {
      note.tags = newTag;
      note.updatedAt = Date.now();
      saveToLocalStorage();
      renderTagFilters();
      renderNotes();
    }
  }

  function createNewNote() {
    const newId = Date.now().toString() + Math.random().toString(36);
    const newNote = {
      id: newId,
      title: "Untitled",
      content: "Write something awesome...",
      pinned: false,
      tags: "general",
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
    notes.unshift(newNote);
    saveToLocalStorage();
    renderNotes();
    // focus on new note title after render
    setTimeout(() => {
      const titleInput = document.querySelector(`.note-card[data-id='${newId}'] .note-title`);
      if (titleInput) titleInput.focus();
    }, 100);
  }

  // drag and drop logic (reorder)
  function handleDragStart(e, index) {
    dragSourceIndex = index;
    e.dataTransfer.effectAllowed = "move";
    e.target.classList.add("dragging");
  }
  function handleDragEnd(e) {
    e.target.classList.remove("dragging");
    dragSourceIndex = null;
    document.querySelectorAll(".note-card").forEach(card => card.classList.remove("drag-over"));
  }
  function handleDragOver(e, idx) {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const targetCard = e.currentTarget;
    if (!targetCard.classList.contains("drag-over")) {
      document.querySelectorAll(".note-card").forEach(c => c.classList.remove("drag-over"));
      targetCard.classList.add("drag-over");
    }
  }
  function handleDrop(e, targetIndex) {
    e.preventDefault();
    if (dragSourceIndex === null || dragSourceIndex === targetIndex) return;
    // get current filtered order (visible notes)
    const filtered = getFilteredNotes();
    if (dragSourceIndex >= filtered.length || targetIndex >= filtered.length) return;
    const draggedNoteId = filtered[dragSourceIndex].id;
    const targetNoteId = filtered[targetIndex].id;
    // find real indices in master notes array
    const realDraggedIdx = notes.findIndex(n => n.id === draggedNoteId);
    const realTargetIdx = notes.findIndex(n => n.id === targetNoteId);
    if (realDraggedIdx !== -1 && realTargetIdx !== -1) {
      const [moved] = notes.splice(realDraggedIdx, 1);
      notes.splice(realTargetIdx, 0, moved);
      saveToLocalStorage();
      renderNotes();
    }
    document.querySelectorAll(".note-card").forEach(c => c.classList.remove("drag-over"));
    dragSourceIndex = null;
  }

  // render notes grid with full interactivity
  function renderNotes() {
    const filteredNotes = getFilteredNotes();
    if (filteredNotes.length === 0) {
      notesGrid.style.display = "grid";
      notesGrid.innerHTML = "";
      emptyMsgDiv.style.display = "block";
      renderTagFilters();
      return;
    }
    emptyMsgDiv.style.display = "none";
    notesGrid.style.display = "grid";
    notesGrid.innerHTML = "";

    filteredNotes.forEach((note, idx) => {
      const card = document.createElement("div");
      card.className = "note-card";
      card.setAttribute("data-id", note.id);
      card.setAttribute("draggable", "true");
      card.addEventListener("dragstart", (e) => handleDragStart(e, idx));
      card.addEventListener("dragend", handleDragEnd);
      card.addEventListener("dragover", (e) => handleDragOver(e, idx));
      card.addEventListener("drop", (e) => handleDrop(e, idx));

      // inner content
      const headerDiv = document.createElement("div");
      headerDiv.className = "note-header";
      const titleInput = document.createElement("input");
      titleInput.type = "text";
      titleInput.className = "note-title";
      titleInput.value = note.title;
      titleInput.placeholder = "Title";
      titleInput.addEventListener("input", (e) => updateNoteField(note.id, "title", e.target.value));
      
      const pinBtn = document.createElement("button");
      pinBtn.className = `pin-btn ${note.pinned ? "active" : ""}`;
      pinBtn.innerHTML = note.pinned ? "📌" : "📍";
      pinBtn.addEventListener("click", (e) => { e.stopPropagation(); togglePin(note.id); });
      
      const delBtn = document.createElement("button");
      delBtn.className = "delete-btn";
      delBtn.innerHTML = "🗑️";
      delBtn.addEventListener("click", (e) => { e.stopPropagation(); deleteNote(note.id); });
      
      headerDiv.appendChild(titleInput);
      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.gap = "8px";
      actions.appendChild(pinBtn);
      actions.appendChild(delBtn);
      headerDiv.appendChild(actions);
      
      const contentArea = document.createElement("textarea");
      contentArea.className = "note-content";
      contentArea.rows = 3;
      contentArea.value = note.content;
      contentArea.addEventListener("input", (e) => updateNoteField(note.id, "content", e.target.value));
      
      const metaDiv = document.createElement("div");
      metaDiv.className = "note-meta";
      const timestamp = new Date(note.updatedAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
      const tagSelect = document.createElement("select");
      tagSelect.className = "tag-selector";
      const allTags = getAllUniqueTags();
      const optionSet = new Set([...allTags, "general", "idea", "welcome", "feature"]);
      const finalTagOptions = Array.from(optionSet).sort();
      finalTagOptions.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        if (note.tags === t) opt.selected = true;
        tagSelect.appendChild(opt);
      });
      tagSelect.addEventListener("change", (e) => updateTagsForNote(note.id, e.target.value));
      
      metaDiv.innerHTML = `<span>🕘 ${timestamp}</span>`;
      metaDiv.appendChild(tagSelect);
      
      card.appendChild(headerDiv);
      card.appendChild(contentArea);
      card.appendChild(metaDiv);
      
      notesGrid.appendChild(card);
    });
    renderTagFilters(); // refresh tag filters after any note change
  }

  // initial setup & event listeners
  function init() {
    loadFromLocalStorage();
    renderNotes();
    // search listener
    searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      renderNotes();
    });
    addBtn.addEventListener("click", () => createNewNote());
    themeToggle.addEventListener("click", () => toggleTheme());
    // auto-save already handled by input events + updateNoteField triggers save & re-render
    // also if window beforeunload safe
    window.addEventListener("beforeunload", () => saveToLocalStorage());
    // optional click outside / but all inline is auto-save
  }

  init();
</script>
</body>
</html>
