<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>HabitForge · streak & heatmap tracker</title>
  <!-- Google Fonts & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* light mode (default) */
      --bg-gradient: linear-gradient(145deg, #f5f9ff 0%, #eef2ff 100%);
      --card-bg: rgba(255, 255, 255, 0.65);
      --card-border: rgba(255, 255, 255, 0.8);
      --text-primary: #0b1e33;
      --text-secondary: #334155;
      --accent: #6366f1;
      --accent-light: #a5b4fc;
      --glass-blur: blur(14px);
      --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.08), 0 8px 16px -6px rgba(0,0,0,0.03);
      --heat-empty: #ebedf0;
      --heat-light: #c7d2fe;
      --heat-medium: #818cf8;
      --heat-heavy: #4f46e5;
      --danger: #ef4444;
    }

    body.dark {
      --bg-gradient: linear-gradient(145deg, #020617 0%, #0f172a 100%);
      --card-bg: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #818cf8;
      --accent-light: #6366f1;
      --glass-blur: blur(16px);
      --shadow: 0 25px 40px -12px rgba(0,0,0,0.6);
      --heat-empty: #1e293b;
      --heat-light: #4338ca;
      --heat-medium: #6366f1;
      --heat-heavy: #a5b4fc;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
      transition: background 0.3s, color 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      max-width: 800px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* header */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-weight: 700;
      font-size: 1.9rem;
      background: linear-gradient(135deg, var(--accent), #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .theme-toggle {
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      cursor: pointer;
      font-weight: 500;
      box-shadow: var(--shadow);
      transition: 0.2s;
    }

    /* glass cards */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      border-radius: 38px;
      padding: 1.8rem 1.8rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, border 0.2s;
    }
    .glass-card:hover {
      transform: perspective(600px) rotateX(0.5deg) rotateY(0.5deg);
    }

    /* add habit */
    .add-habit-area {
      display: flex;
      gap: 0.8rem;
    }
    .add-input {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border-radius: 40px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      font-size: 1rem;
      outline: none;
      color: var(--text-primary);
    }
    .btn {
      background: var(--accent);
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.9rem 1.8rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 12px 20px -8px var(--accent);
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 16px 28px -6px var(--accent);
    }
    .btn:active { transform: scale(0.97); }

    /* habit list */
    .habit-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .habit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 1rem 1.4rem;
      transition: all 0.2s;
      animation: fadeSlide 0.25s ease;
    }
    .habit-item:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 15px 25px -8px rgba(0,0,0,0.1);
    }
    .habit-info {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .habit-name {
      font-weight: 600;
      font-size: 1.1rem;
    }
    .streak-badge {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .streak-badge i { color: var(--accent); }
    .check-btn {
      background: transparent;
      border: 2px solid var(--accent);
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-primary);
      background: rgba(255,255,255,0.1);
    }
    .check-btn.done {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-light);
    }
    .delete-habit {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      margin-left: 0.8rem;
      opacity: 0.6;
      transition: 0.2s;
    }
    .delete-habit:hover { color: var(--danger); opacity: 1; }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .pop-effect { animation: pop 0.25s ease; }
    @keyframes pop {
      0% { transform: scale(0.8); } 70% { transform: scale(1.15); } 100% { transform: scale(1); }
    }

    /* heatmap section */
    .heatmap-title {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .heatmap-grid {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 6px;
    }
    .week-column {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .day-cell {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: var(--heat-empty);
      transition: 0.15s;
      cursor: default;
      position: relative;
    }
    .day-cell[data-intensity="1"] { background: var(--heat-light); }
    .day-cell[data-intensity="2"] { background: var(--heat-medium); }
    .day-cell[data-intensity="3"] { background: var(--heat-heavy); }
    .day-cell:hover {
      transform: scale(1.5);
      box-shadow: 0 0 12px var(--accent-light);
      z-index: 5;
    }
    .tooltip {
      position: absolute;
      background: #0f172a;
      color: white;
      font-size: 0.7rem;
      padding: 4px 8px;
      border-radius: 8px;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: 0.15s;
    }
    .day-cell:hover .tooltip { opacity: 1; }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--heat-empty) 30%, rgba(128,128,128,0.15) 50%, var(--heat-empty) 70%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 14px;
    }
    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    @media (max-width: 500px) {
      .add-habit-area { flex-direction: column; }
    }
  </style>
</head>
<body class="light">
<div class="app">
  <header class="app-header">
    <div class="logo"><i class="fas fa-fire" style="margin-right: 10px;"></i>HabitForge</div>
    <div class="theme-toggle" id="themeToggle">🌙 Dark</div>
  </header>

  <!-- Add habit card -->
  <div class="glass-card">
    <div class="add-habit-area">
      <input type="text" class="add-input" id="newHabitInput" placeholder="🧘 Read, exercise, meditate...">
      <button class="btn" id="addHabitBtn"><i class="fas fa-plus"></i> Add</button>
    </div>
  </div>

  <!-- Habits list card -->
  <div class="glass-card" id="habitsCard">
    <h3 style="margin-bottom: 1.2rem;"><i class="fas fa-list-check"></i> Today's habits</h3>
    <div class="habit-list" id="habitListContainer">
      <!-- dynamically filled -->
    </div>
    <div id="emptyState" style="text-align:center; color:var(--text-secondary); padding:2rem;">✨ Add a habit to start building streaks</div>
  </div>

  <!-- Heatmap card -->
  <div class="glass-card" id="heatmapCard">
    <div class="heatmap-title">
      <span><i class="fas fa-chart-bar"></i> Activity heatmap (last 20 weeks)</span>
      <span style="font-size:0.8rem;"><span style="background:var(--heat-empty); padding:2px 8px; border-radius:8px;">less</span> <span style="background:var(--heat-heavy); padding:2px 8px; border-radius:8px;">more</span></span>
    </div>
    <div class="heatmap-grid" id="heatmapContainer"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- STORAGE & STATE ----------
    const STORAGE_KEY = 'habitforge_data';
    let habits = [];               // { id, name, created, completedDates: Set of 'YYYY-MM-DD' }
    
    const todayStr = () => new Date().toISOString().split('T')[0];
    
    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          habits = parsed.map(h => ({ ...h, completedDates: new Set(h.completedDates) }));
        } catch(e){ habits = []; }
      }
      if (!habits.length) {
        // seed demo habits if empty
        habits.push(
          { id: Date.now()+1, name: 'Read 20 pages', created: '2025-04-01', completedDates: new Set(['2025-04-20','2025-04-21','2025-04-22']) },
          { id: Date.now()+2, name: 'Exercise', created: '2025-04-02', completedDates: new Set(['2025-04-21','2025-04-22','2025-04-23']) }
        );
      }
    }
    function saveToStorage() {
      const toStore = habits.map(h => ({ ...h, completedDates: Array.from(h.completedDates) }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toStore));
    }

    // ---------- STREAK CALCULATION ----------
    function calculateStreaks(habit) {
      const dates = Array.from(habit.completedDates).sort();
      if (dates.length === 0) return { current: 0, longest: 0 };
      
      let longest = 0, currentStreak = 0;
      let tempStreak = 1;
      for (let i = 1; i < dates.length; i++) {
        const prev = new Date(dates[i-1]);
        const curr = new Date(dates[i]);
        const diff = (curr - prev) / (1000*60*60*24);
        if (diff === 1) { tempStreak++; } else { longest = Math.max(longest, tempStreak); tempStreak = 1; }
      }
      longest = Math.max(longest, tempStreak);
      
      // current streak: must end today or yesterday
      const today = todayStr();
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      if (dates.includes(today)) {
        currentStreak = 1;
        for (let i = dates.length-1; i>0; i--) {
          if ((new Date(dates[i]) - new Date(dates[i-1])) / 86400000 === 1) currentStreak++;
          else break;
        }
      } else if (dates.includes(yesterday)) {
        currentStreak = 1;
        for (let i = dates.length-1; i>0; i--) {
          if ((new Date(dates[i]) - new Date(dates[i-1])) / 86400000 === 1) currentStreak++;
          else break;
        }
      } else { currentStreak = 0; }
      
      return { current: currentStreak, longest: Math.max(longest, currentStreak) };
    }

    // ---------- RENDER HABITS ----------
    const habitContainer = document.getElementById('habitListContainer');
    const emptyState = document.getElementById('emptyState');
    
    function renderHabits() {
      habitContainer.innerHTML = '';
      if (habits.length === 0) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';
      
      habits.forEach(habit => {
        const today = todayStr();
        const isDoneToday = habit.completedDates.has(today);
        const streaks = calculateStreaks(habit);
        
        const item = document.createElement('div');
        item.className = 'habit-item';
        item.innerHTML = `
          <div class="habit-info">
            <span class="habit-name">${escapeHtml(habit.name)}</span>
            <div class="streak-badge">
              <span><i class="fas fa-fire"></i> ${streaks.current} current</span>
              <span><i class="fas fa-trophy"></i> ${streaks.longest} best</span>
            </div>
          </div>
          <div style="display:flex; align-items:center;">
            <button class="check-btn ${isDoneToday ? 'done' : ''}" data-id="${habit.id}" aria-label="toggle complete">
              <i class="fas fa-check"></i>
            </button>
            <button class="delete-habit" data-id="${habit.id}" title="delete habit"><i class="fas fa-trash"></i></button>
          </div>
        `;
        habitContainer.appendChild(item);
      });
      
      // attach events
      document.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = Number(btn.dataset.id);
          toggleHabitCompletion(id);
          btn.classList.add('pop-effect');
          setTimeout(() => btn.classList.remove('pop-effect'), 250);
        });
      });
      document.querySelectorAll('.delete-habit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = Number(btn.dataset.id);
          deleteHabit(id);
        });
      });
    }
    
    function escapeHtml(text) {
      const map = {'&':'&amp;','<':'&lt;','>':'&gt;'};
      return text.replace(/[&<>]/g, m => map[m]);
    }

    function toggleHabitCompletion(id) {
      const habit = habits.find(h => h.id === id);
      if (!habit) return;
      const today = todayStr();
      if (habit.completedDates.has(today)) {
        habit.completedDates.delete(today);
      } else {
        habit.completedDates.add(today);
      }
      saveToStorage();
      renderHabits();
      renderHeatmap();
    }

    function deleteHabit(id) {
      habits = habits.filter(h => h.id !== id);
      saveToStorage();
      renderHabits();
      renderHeatmap();
    }

    function addHabit(name) {
      const trimmed = name.trim();
      if (!trimmed) return;
      habits.push({
        id: Date.now(),
        name: trimmed,
        created: todayStr(),
        completedDates: new Set()
      });
      saveToStorage();
      renderHabits();
      renderHeatmap();
      document.getElementById('newHabitInput').value = '';
    }

    // ---------- HEATMAP (GitHub style) ----------
    function renderHeatmap() {
      const container = document.getElementById('heatmapContainer');
      container.innerHTML = '';
      
      // collect all completions across habits (count how many habits completed per day)
      const dateCountMap = new Map(); // dateStr -> count
      habits.forEach(h => {
        h.completedDates.forEach(date => {
          dateCountMap.set(date, (dateCountMap.get(date) || 0) + 1);
        });
      });
      
      // generate last 20 weeks (including current partial week)
      const today = new Date();
      const dayOfWeek = today.getDay(); // 0=Sun
      // start from 20 weeks ago Sunday
      const startDate = new Date(today);
      startDate.setDate(today.getDate() - dayOfWeek - (19*7)); 
      
      const weeks = [];
      for (let w = 0; w < 20; w++) {
        const week = [];
        for (let d = 0; d < 7; d++) {
          const date = new Date(startDate);
          date.setDate(startDate.getDate() + w*7 + d);
          const dateStr = date.toISOString().split('T')[0];
          const count = dateCountMap.get(dateStr) || 0;
          let intensity = 0;
          if (count >= 3) intensity = 3;
          else if (count === 2) intensity = 2;
          else if (count === 1) intensity = 1;
          week.push({ dateStr, intensity, count });
        }
        weeks.push(week);
      }
      
      weeks.forEach(week => {
        const col = document.createElement('div');
        col.className = 'week-column';
        week.forEach(day => {
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          cell.setAttribute('data-intensity', day.intensity);
          cell.innerHTML = `<span class="tooltip">${day.dateStr} · ${day.count} habits</span>`;
          col.appendChild(cell);
        });
        container.appendChild(col);
      });
    }

    // ---------- THEME ----------
    const themeToggle = document.getElementById('themeToggle');
    function setTheme(isDark) {
      if (isDark) {
        document.body.classList.add('dark');
        document.body.classList.remove('light');
        themeToggle.innerHTML = '☀️ Light';
        localStorage.setItem('habitforge_theme', 'dark');
      } else {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        themeToggle.innerHTML = '🌙 Dark';
        localStorage.setItem('habitforge_theme', 'light');
      }
    }
    themeToggle.addEventListener('click', () => {
      setTheme(!document.body.classList.contains('dark'));
    });

    // ---------- SKELETON (simulate load) ----------
    function showSkeleton() {
      habitContainer.innerHTML = '<div class="skeleton" style="height:60px; width:100%; margin-bottom:10px;"></div><div class="skeleton" style="height:60px; width:100%;"></div>';
    }

    // ---------- INIT ----------
    function init() {
      const savedTheme = localStorage.getItem('habitforge_theme');
      setTheme(savedTheme === 'dark');
      
      showSkeleton();
      setTimeout(() => {
        loadFromStorage();
        renderHabits();
        renderHeatmap();
      }, 200);
      
      document.getElementById('addHabitBtn').addEventListener('click', () => {
        const input = document.getElementById('newHabitInput');
        addHabit(input.value);
      });
      document.getElementById('newHabitInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addHabit(e.target.value);
      });
    }
    
    init();
  })();
</script>
</body>
</html>
