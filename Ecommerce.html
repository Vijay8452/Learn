<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LUMINA | Modern E‑commerce</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    /* ========== THEMES ========== */
    :root {
      --transition-default: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    body.light {
      --bg-gradient: linear-gradient(145deg, #f9fafc 0%, #f1f4f9 100%);
      --surface-glass: rgba(255, 255, 255, 0.7);
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --border-light: 1px solid rgba(255, 255, 255, 0.6);
      --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
      --shadow-hover: 0 25px 40px -12px rgba(0, 0, 0, 0.15);
      --drawer-bg: rgba(255, 255, 255, 0.98);
    }

    body.dark {
      --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172f 100%);
      --surface-glass: rgba(15, 25, 45, 0.65);
      --card-bg: rgba(20, 30, 55, 0.7);
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e6;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.4);
      --border-light: 1px solid rgba(56, 189, 248, 0.2);
      --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 30px 45px -12px rgba(0, 0, 0, 0.5);
      --drawer-bg: rgba(10, 20, 35, 0.96);
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-primary);
      transition: background 0.4s ease, color 0.2s ease;
      min-height: 100vh;
    }

    /* glassmorphism header */
    .glass-header {
      backdrop-filter: blur(16px);
      background: var(--surface-glass);
      border-bottom: var(--border-light);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-bar {
      flex: 1;
      max-width: 320px;
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 12px 20px;
      border-radius: 60px;
      border: none;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      color: var(--text-primary);
      outline: none;
      transition: 0.2s;
    }

    .header-actions {
      display: flex;
      gap: 14px;
    }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--text-primary);
      transition: var(--transition-default);
    }

    .icon-btn:hover {
      background: var(--accent);
      transform: scale(1.05);
      color: white;
    }

    .cart-count {
      position: relative;
    }
    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      border-radius: 30px;
      padding: 2px 8px;
      font-weight: bold;
    }

    /* layout: sidebar + products */
    .app-layout {
      display: flex;
      gap: 28px;
      padding: 28px 28px 40px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* filter sidebar */
    .filter-sidebar {
      width: 260px;
      background: var(--surface-glass);
      backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 24px 18px;
      height: fit-content;
      border: var(--border-light);
      transition: var(--transition-default);
    }

    .filter-group {
      margin-bottom: 28px;
    }
    .filter-group h4 {
      margin-bottom: 12px;
      font-weight: 600;
    }
    .category-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      cursor: pointer;
    }
    .price-range {
      width: 100%;
    }
    select, input[type="range"] {
      width: 100%;
      padding: 8px;
      border-radius: 40px;
      background: rgba(128,128,128,0.2);
      border: none;
      color: var(--text-primary);
    }

    /* product grid */
    .products-main {
      flex: 1;
    }
    .sort-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
      animation: fadeInUp 0.5s ease;
    }

    /* product card (premium) */
    .product-card {
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      overflow: hidden;
      transition: var(--transition-default);
      border: var(--border-light);
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-hover);
    }
    .img-container {
      position: relative;
      overflow: hidden;
      height: 220px;
    }
    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-img {
      transform: scale(1.08);
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
    }
    .product-card:hover .card-overlay {
      opacity: 1;
    }
    .add-cart-btn {
      background: var(--accent);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transform: scale(0.9);
      transition: 0.2s;
    }
    .add-cart-btn:hover {
      transform: scale(1);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .card-info {
      padding: 18px;
    }
    .product-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .price {
      font-weight: 800;
      font-size: 1.3rem;
      margin-top: 8px;
      color: var(--accent);
    }
    .rating {
      color: #fbbf24;
      margin-top: 6px;
      font-size: 0.8rem;
    }

    /* cart drawer */
    .cart-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      max-width: 450px;
      height: 100vh;
      background: var(--drawer-bg);
      backdrop-filter: blur(20px);
      z-index: 1000;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      box-shadow: -8px 0 32px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      border-left: var(--border-light);
    }
    .cart-drawer.open {
      transform: translateX(0);
    }
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: 0.2s;
    }
    .drawer-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .cart-header {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(128,128,128,0.3);
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .cart-item {
      display: flex;
      gap: 14px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 12px;
      animation: slideRight 0.2s ease;
    }
    .cart-item img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 20px;
    }
    .item-details {
      flex: 1;
    }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .quantity-control button {
      background: var(--accent);
      border: none;
      width: 28px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    .cart-total {
      padding: 20px;
      border-top: 1px solid rgba(128,128,128,0.3);
      font-weight: 800;
      font-size: 1.4rem;
    }

    /* skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(128,128,128,0.1) 25%, rgba(128,128,128,0.2) 50%, rgba(128,128,128,0.1) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 24px;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .fly-cart {
      position: fixed;
      z-index: 2000;
      transition: transform 0.6s cubic-bezier(0.3, 1.2, 0.4, 1);
      width: 50px;
      height: 50px;
      border-radius: 30px;
      background: var(--accent);
      pointer-events: none;
    }

    @media (max-width: 860px) {
      .app-layout { flex-direction: column; }
      .filter-sidebar { width: 100%; display: flex; flex-wrap: wrap; gap: 20px; }
      .filter-group { flex: 1; min-width: 140px; }
    }
    @media (max-width: 640px) {
      .glass-header { flex-direction: column; align-items: stretch; }
      .search-bar { max-width: none; }
    }
  </style>
</head>
<body class="dark">
  <div class="glass-header">
    <div class="logo"><h1><i class="fas fa-gem"></i> LUMINA</h1></div>
    <div class="search-bar"><input type="text" id="searchInput" placeholder="Search products..."></div>
    <div class="header-actions">
      <button id="themeToggleBtn" class="icon-btn"><i class="fas fa-moon"></i></button>
      <button id="cartIconBtn" class="icon-btn cart-count"><i class="fas fa-bag-shopping"></i><span id="cartItemCount" class="badge">0</span></button>
    </div>
  </div>
  <div class="app-layout">
    <aside class="filter-sidebar">
      <div class="filter-group"><h4><i class="fas fa-tags"></i> Category</h4><div id="categoryFilters"></div></div>
      <div class="filter-group"><h4><i class="fas fa-dollar-sign"></i> Max Price</h4><input type="range" id="priceRange" min="0" max="500" value="500" step="5"><span id="priceValue">$500</span></div>
      <div class="filter-group"><h4><i class="fas fa-sort"></i> Sort By</h4><select id="sortSelect"><option value="default">Default</option><option value="lowHigh">Price: Low to High</option><option value="highLow">Price: High to Low</option><option value="rating">Popularity (Rating)</option></select></div>
    </aside>
    <main class="products-main">
      <div class="sort-bar"></div>
      <div id="productGrid" class="product-grid"></div>
    </main>
  </div>

  <!-- Cart Drawer -->
  <div id="cartDrawerOverlay" class="drawer-overlay"></div>
  <div id="cartDrawer" class="cart-drawer">
    <div class="cart-header"><h3><i class="fas fa-shopping-cart"></i> Your Cart</h3><button id="closeCartBtn" class="icon-btn"><i class="fas fa-times"></i></button></div>
    <div id="cartItemsList" class="cart-items"><div style="text-align:center; padding:40px;">Cart is empty</div></div>
    <div class="cart-total">Total: $<span id="cartTotalPrice">0.00</span></div>
  </div>

  <script>
    // ---------- MOCK DATA (premium products) ----------
    const productsData = [
      { id: 1, name: "Aether Wireless Headphones", price: 199, category: "Electronics", rating: 4.8, image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&h=300&fit=crop", popular: 480 },
      { id: 2, name: "Nebula Smartwatch", price: 249, category: "Wearables", rating: 4.6, image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&h=300&fit=crop", popular: 320 },
      { id: 3, name: "Echo Leather Backpack", price: 89, category: "Fashion", rating: 4.9, image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300&h=300&fit=crop", popular: 210 },
      { id: 4, name: "Quantum Laptop Stand", price: 59, category: "Accessories", rating: 4.3, image: "https://images.unsplash.com/photo-1583394838336-acd977736f90?w=300&h=300&fit=crop", popular: 150 },
      { id: 5, name: "Minimalist Ceramic Mug", price: 24, category: "Home", rating: 4.7, image: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=300&h=300&fit=crop", popular: 430 },
      { id: 6, name: "Orbit Mechanical Keyboard", price: 129, category: "Electronics", rating: 4.8, image: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=300&h=300&fit=crop", popular: 290 },
      { id: 7, name: "Cosmic Sneakers", price: 119, category: "Fashion", rating: 4.5, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&h=300&fit=crop", popular: 510 },
      { id: 8, name: "Glow LED Desk Lamp", price: 45, category: "Home", rating: 4.4, image: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=300&h=300&fit=crop", popular: 180 }
    ];
    let allProducts = [...productsData];
    let cart = [];
    let activeFilters = { category: "all", maxPrice: 500, searchQuery: "", sortBy: "default" };

    // DOM elements
    const productGrid = document.getElementById('productGrid');
    const categoryFiltersDiv = document.getElementById('categoryFilters');
    const priceRange = document.getElementById('priceRange');
    const priceValue = document.getElementById('priceValue');
    const sortSelect = document.getElementById('sortSelect');
    const searchInput = document.getElementById('searchInput');
    const cartDrawer = document.getElementById('cartDrawer');
    const overlay = document.getElementById('cartDrawerOverlay');
    const cartItemsList = document.getElementById('cartItemsList');
    const cartTotalSpan = document.getElementById('cartTotalPrice');
    const cartItemCountSpan = document.getElementById('cartItemCount');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const cartIconBtn = document.getElementById('cartIconBtn');
    const closeCartBtn = document.getElementById('closeCartBtn');

    // helpers
    function saveCart() { localStorage.setItem('lumina_cart', JSON.stringify(cart)); updateCartUI(); }
    function loadCart() { const saved = localStorage.getItem('lumina_cart'); if(saved) { cart = JSON.parse(saved); updateCartUI(); } else { cart = []; updateCartUI(); } }
    
    function updateCartUI() {
      renderCartItems();
      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      cartTotalSpan.innerText = total.toFixed(2);
      const itemCount = cart.reduce((sum, i) => sum + i.quantity, 0);
      cartItemCountSpan.innerText = itemCount;
      localStorage.setItem('lumina_cart', JSON.stringify(cart));
    }

    function renderCartItems() {
      if (!cart.length) { cartItemsList.innerHTML = '<div style="text-align:center; padding:40px;">✨ Your cart is empty</div>'; return; }
      cartItemsList.innerHTML = cart.map(item => `
        <div class="cart-item" data-id="${item.id}">
          <img src="${item.image}" alt="${item.name}">
          <div class="item-details"><strong>${item.name}</strong><br>$${item.price}
            <div class="quantity-control"><button class="qty-minus" data-id="${item.id}">-</button><span>${item.quantity}</span><button class="qty-plus" data-id="${item.id}">+</button><button class="remove-item" data-id="${item.id}" style="background:none; color:red;"><i class="fas fa-trash"></i></button></div>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('.qty-minus').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); changeQuantity(id, -1); }));
      document.querySelectorAll('.qty-plus').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); changeQuantity(id, 1); }));
      document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', (e) => { const id = parseInt(btn.dataset.id); removeFromCart(id); }));
    }

    function changeQuantity(id, delta) {
      const idx = cart.findIndex(i => i.id === id);
      if(idx !== -1) { cart[idx].quantity += delta; if(cart[idx].quantity <= 0) cart.splice(idx,1); saveCart(); updateCartUI(); renderFilteredProducts(); }
    }
    function removeFromCart(id) { cart = cart.filter(i => i.id !== id); saveCart(); updateCartUI(); renderFilteredProducts(); }

    function addToCart(product, event) {
      const existing = cart.find(i => i.id === product.id);
      if(existing) existing.quantity++;
      else cart.push({ ...product, quantity: 1 });
      saveCart();
      updateCartUI();
      animateAddToCart(event);
      renderFilteredProducts(); // update UI button maybe
    }

    function animateAddToCart(event) {
      const button = event.target.closest('.add-cart-btn');
      if(!button) return;
      const rect = button.getBoundingClientRect();
      const fly = document.createElement('div');
      fly.className = 'fly-cart';
      fly.style.left = rect.left + 'px';
      fly.style.top = rect.top + 'px';
      document.body.appendChild(fly);
      const targetRect = document.getElementById('cartIconBtn').getBoundingClientRect();
      fly.style.transition = 'transform 0.6s cubic-bezier(0.2, 1.2, 0.8, 1)';
      requestAnimationFrame(() => {
        fly.style.transform = `translate(${targetRect.left - rect.left}px, ${targetRect.top - rect.top}px) scale(0.2)`;
        fly.style.opacity = '0.5';
      });
      setTimeout(() => fly.remove(), 600);
      button.style.transform = 'scale(0.9)';
      setTimeout(() => { button.style.transform = ''; }, 150);
    }

    // filtering logic
    function getFilteredProducts() {
      let filtered = [...allProducts];
      if(activeFilters.category !== 'all') filtered = filtered.filter(p => p.category === activeFilters.category);
      filtered = filtered.filter(p => p.price <= activeFilters.maxPrice);
      if(activeFilters.searchQuery) filtered = filtered.filter(p => p.name.toLowerCase().includes(activeFilters.searchQuery.toLowerCase()));
      if(activeFilters.sortBy === 'lowHigh') filtered.sort((a,b) => a.price - b.price);
      else if(activeFilters.sortBy === 'highLow') filtered.sort((a,b) => b.price - a.price);
      else if(activeFilters.sortBy === 'rating') filtered.sort((a,b) => b.rating - a.rating);
      return filtered;
    }

    function renderFilteredProducts() {
      const filtered = getFilteredProducts();
      if(filtered.length === 0) { productGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">No products found 🌿</div>`; return; }
      productGrid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <div class="img-container"><img class="product-img" src="${p.image}" alt="${p.name}"><div class="card-overlay"><button class="add-cart-btn" data-id="${p.id}"><i class="fas fa-cart-plus"></i> Add to Cart</button></div></div>
          <div class="card-info"><div class="product-title">${p.name}</div><div class="price">$${p.price}</div><div class="rating"><i class="fas fa-star"></i> ${p.rating}</div></div>
        </div>
      `).join('');
      document.querySelectorAll('.add-cart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const product = allProducts.find(p => p.id === id); if(product) addToCart(product, e); });
      });
    }

    // category generation
    function buildCategoryFilters() {
      const cats = ['all', ...new Set(allProducts.map(p => p.category))];
      categoryFiltersDiv.innerHTML = cats.map(cat => `
        <div class="category-item" data-cat="${cat}"><input type="radio" name="category" value="${cat}" ${activeFilters.category === cat ? 'checked' : ''}> <span>${cat === 'all' ? 'All' : cat}</span></div>
      `).join('');
      document.querySelectorAll('.category-item').forEach(el => {
        el.addEventListener('click', () => { const val = el.dataset.cat; activeFilters.category = val; renderFilteredProducts(); updateCategoryUI(); });
      });
    }
    function updateCategoryUI() { document.querySelectorAll('.category-item input').forEach(inp => { if(inp.value === activeFilters.category) inp.checked = true; }); }

    // price range & events
    priceRange.addEventListener('input', (e) => { activeFilters.maxPrice = parseInt(e.target.value); priceValue.innerText = `$${activeFilters.maxPrice}`; renderFilteredProducts(); });
    sortSelect.addEventListener('change', (e) => { activeFilters.sortBy = e.target.value; renderFilteredProducts(); });
    searchInput.addEventListener('input', (e) => { activeFilters.searchQuery = e.target.value; renderFilteredProducts(); });

    // cart drawer
    function openDrawer() { cartDrawer.classList.add('open'); overlay.classList.add('active'); }
    function closeDrawer() { cartDrawer.classList.remove('open'); overlay.classList.remove('active'); }
    cartIconBtn.addEventListener('click', openDrawer);
    closeCartBtn.addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);

    // theme
    function initTheme() { const savedTheme = localStorage.getItem('lumina_theme'); if(savedTheme === 'light') { document.body.classList.add('light'); document.body.classList.remove('dark'); themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>'; } else { document.body.classList.add('dark'); document.body.classList.remove('light'); themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>'; } }
    function toggleTheme() { if(document.body.classList.contains('dark')) { document.body.classList.remove('dark'); document.body.classList.add('light'); localStorage.setItem('lumina_theme', 'light'); themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>'; } else { document.body.classList.remove('light'); document.body.classList.add('dark'); localStorage.setItem('lumina_theme', 'dark'); themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>'; } }
    themeToggleBtn.addEventListener('click', toggleTheme);

    // initial loading + skeleton simulation
    function showSkeleton() { productGrid.innerHTML = Array(6).fill().map(() => `<div class="product-card skeleton" style="height:320px;"></div>`).join(''); }
    function init() { showSkeleton(); setTimeout(() => { buildCategoryFilters(); loadCart(); renderFilteredProducts(); initTheme(); }, 300); }
    init();
  </script>
</body>
</html>
