<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VaultKey · premium password generator</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light mode (default) */
            --bg-gradient: linear-gradient(145deg, #f8fafc 0%, #eef2ff 100%);
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255, 255, 255, 0.9);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --accent-primary: #6366f1;
            --accent-glow: #a5b4fc;
            --slider-track: #e2e8f0;
            --toggle-bg: #cbd5e1;
            --shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.15), 0 8px 18px -6px rgba(0, 0, 0, 0.05);
            --weak: #ef4444;
            --medium: #f59e0b;
            --strong: #22c55e;
            --input-bg: rgba(255,255,255,0.5);
        }

        body.dark {
            --bg-gradient: linear-gradient(145deg, #020617 0%, #0f172a 100%);
            --card-bg: rgba(15, 23, 42, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-primary: #818cf8;
            --accent-glow: #6366f1;
            --slider-track: #1e293b;
            --toggle-bg: #334155;
            --shadow: 0 25px 40px -12px #00000080, 0 0 0 1px rgba(255,255,255,0.02);
            --input-bg: rgba(15,23,42,0.7);
            --weak: #f87171;
            --medium: #fbbf24;
            --strong: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-primary);
            margin: 0;
            padding: 1.5rem;
            transition: background 0.3s, color 0.2s;
        }

        .app-container {
            max-width: 580px;
            width: 100%;
        }

        /* header + theme toggle */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-primary), #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .theme-toggle {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-size: 1.2rem;
            transition: 0.2s;
        }

        /* main card — glass */
        .generator-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 42px;
            padding: 2.2rem 2rem;
            box-shadow: var(--shadow);
            transition: background 0.3s, border 0.3s;
        }

        /* password display area */
        .password-field {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 0.3rem 0.3rem 0.3rem 1.8rem;
            border: 1px solid var(--card-border);
            margin-bottom: 2rem;
            transition: box-shadow 0.2s;
        }
        .password-field:focus-within {
            box-shadow: 0 0 0 3px rgba(99,102,241,0.3);
        }

        #passwordDisplay {
            flex: 1;
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Inter', monospace;
            letter-spacing: 1px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            padding: 0.75rem 0;
            min-width: 0;
            transition: opacity 0.15s;
        }
        .password-actions {
            display: flex;
            gap: 0.4rem;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            width: 52px;
            height: 52px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .icon-btn:hover {
            background: var(--accent-primary);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 6px 14px rgba(99,102,241,0.4);
        }
        .icon-btn:active { transform: scale(0.96); }

        /* Length slider section */
        .length-control {
            margin-bottom: 2rem;
        }
        .length-header {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }
        #lengthValue {
            background: var(--accent-primary);
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-weight: 700;
        }
        input[type=range] {
            width: 100%;
            height: 8px;
            background: var(--slider-track);
            border-radius: 20px;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            border: 3px solid var(--accent-primary);
            cursor: pointer;
            transition: 0.15s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        
        /* toggles (checkboxes) */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem 1rem;
            margin-bottom: 2.5rem;
        }
        .toggle-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            font-weight: 500;
            user-select: none;
        }
        .toggle-item input {
            display: none;
        }
        .custom-checkbox {
            width: 46px;
            height: 26px;
            background: var(--toggle-bg);
            border-radius: 40px;
            position: relative;
            transition: background 0.2s;
            box-shadow: inset 0 1px 3px #0000001a;
        }
        .custom-checkbox::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input:checked + .custom-checkbox {
            background: var(--accent-primary);
        }
        input:checked + .custom-checkbox::after {
            transform: translateX(20px);
        }

        /* strength meter */
        .strength-section {
            margin-bottom: 2.2rem;
        }
        .strength-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-weight: 500;
        }
        .meter-bar {
            height: 10px;
            background: var(--slider-track);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .meter-fill {
            width: 0%;
            height: 100%;
            background: var(--weak);
            border-radius: 20px;
            transition: width 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1), background 0.3s;
            box-shadow: 0 0 10px currentColor;
        }
        #strengthText {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* generate button */
        .generate-btn {
            width: 100%;
            background: linear-gradient(145deg, var(--accent-primary), #22d3ee);
            border: none;
            padding: 1.2rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 16px 30px -8px var(--accent-glow);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        .generate-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 35px -6px #6366f1;
        }
        .generate-btn:active { transform: scale(0.98); }

        /* copy toast (floating) */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: var(--accent-primary);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 20px 30px -5px #00000040;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(8px);
        }
        .toast-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* micro-interactions */
        .fade-transition {
            transition: opacity 0.15s ease;
        }
        .fade-enter { opacity: 0.5; }
        .no-select { user-select: none; }

        @media (max-width: 480px) {
            .generator-card { padding: 1.8rem 1.2rem; }
            #passwordDisplay { font-size: 1.3rem; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Header -->
    <div class="app-header">
        <div class="logo">
            <h1><i class="fas fa-shield-hal" style="margin-right: 8px;"></i>VaultKey</h1>
        </div>
        <div class="theme-toggle" id="themeToggle" aria-label="Theme switch">
            <span>🌙</span>
        </div>
    </div>

    <!-- Glass card -->
    <div class="generator-card">
        <!-- Password display + copy/regenerate -->
        <div class="password-field">
            <input type="text" id="passwordDisplay" readonly value="P4$$w0rd!Gen" aria-label="Generated password">
            <div class="password-actions">
                <button class="icon-btn" id="copyBtn" aria-label="Copy password"><i class="far fa-copy"></i></button>
                <button class="icon-btn" id="regenerateBtn" aria-label="Generate new"><i class="fas fa-sync-alt"></i></button>
            </div>
        </div>

        <!-- Length slider -->
        <div class="length-control">
            <div class="length-header">
                <span>Password length</span>
                <span id="lengthValue">14</span>
            </div>
            <input type="range" id="lengthSlider" min="6" max="40" value="14" step="1">
        </div>

        <!-- Options: Uppercase, Lowercase, Numbers, Symbols -->
        <div class="options-grid">
            <label class="toggle-item">
                <input type="checkbox" id="includeUppercase" checked>
                <span class="custom-checkbox"></span>
                <span><i class="fas fa-arrow-up"></i> Uppercase</span>
            </label>
            <label class="toggle-item">
                <input type="checkbox" id="includeLowercase" checked>
                <span class="custom-checkbox"></span>
                <span><i class="fas fa-arrow-down"></i> Lowercase</span>
            </label>
            <label class="toggle-item">
                <input type="checkbox" id="includeNumbers" checked>
                <span class="custom-checkbox"></span>
                <span><i class="fas fa-hashtag"></i> Numbers</span>
            </label>
            <label class="toggle-item">
                <input type="checkbox" id="includeSymbols" checked>
                <span class="custom-checkbox"></span>
                <span><i class="fas fa-asterisk"></i> Symbols</span>
            </label>
        </div>

        <!-- Strength meter -->
        <div class="strength-section">
            <div class="strength-label">
                <span>Strength</span>
                <span id="strengthText">MEDIUM</span>
            </div>
            <div class="meter-bar">
                <div class="meter-fill" id="strengthMeterFill"></div>
            </div>
        </div>

        <!-- Generate button -->
        <button class="generate-btn" id="generateBtn">
            <i class="fas fa-dice-d6"></i> Generate password
        </button>
    </div>
</div>

<!-- Toast message for copy feedback -->
<div class="toast-message" id="copyToast">✓ Copied!</div>

<script>
    (function(){
        "use strict";

        // ---------- DOM elements ----------
        const passwordDisplay = document.getElementById('passwordDisplay');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const includeUppercase = document.getElementById('includeUppercase');
        const includeLowercase = document.getElementById('includeLowercase');
        const includeNumbers = document.getElementById('includeNumbers');
        const includeSymbols = document.getElementById('includeSymbols');
        const generateBtn = document.getElementById('generateBtn');
        const regenerateBtn = document.getElementById('regenerateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const strengthMeterFill = document.getElementById('strengthMeterFill');
        const strengthText = document.getElementById('strengthText');
        const themeToggle = document.getElementById('themeToggle');
        const toast = document.getElementById('copyToast');
        const body = document.body;

        // Character pools
        const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
        const NUMBERS = '0123456789';
        const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        // ---------- Helper: ensure at least one option active ----------
        function atLeastOneChecked() {
            return includeUppercase.checked || includeLowercase.checked || includeNumbers.checked || includeSymbols.checked;
        }

        function enforceMinimumOne() {
            if (!atLeastOneChecked()) {
                // fallback: force lowercase on
                includeLowercase.checked = true;
            }
        }

        // ---------- Password generation ----------
        function generatePassword() {
            enforceMinimumOne();
            
            const length = parseInt(lengthSlider.value, 10);
            let charPool = '';
            if (includeUppercase.checked) charPool += UPPERCASE;
            if (includeLowercase.checked) charPool += LOWERCASE;
            if (includeNumbers.checked) charPool += NUMBERS;
            if (includeSymbols.checked) charPool += SYMBOLS;

            // Guarantee at least one char from each selected set (security best practice)
            let passwordArray = [];
            const selectedSets = [];
            if (includeUppercase.checked) selectedSets.push(UPPERCASE);
            if (includeLowercase.checked) selectedSets.push(LOWERCASE);
            if (includeNumbers.checked) selectedSets.push(NUMBERS);
            if (includeSymbols.checked) selectedSets.push(SYMBOLS);

            // push one random from each selected set
            selectedSets.forEach(set => {
                const randomIndex = Math.floor(Math.random() * set.length);
                passwordArray.push(set[randomIndex]);
            });

            // fill remaining with full pool
            const remainingLength = length - passwordArray.length;
            for (let i = 0; i < remainingLength; i++) {
                const randomIndex = Math.floor(Math.random() * charPool.length);
                passwordArray.push(charPool[randomIndex]);
            }

            // shuffle (Fisher–Yates)
            for (let i = passwordArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [passwordArray[i], passwordArray[j]] = [passwordArray[j], passwordArray[i]];
            }

            return passwordArray.join('');
        }

        // Update UI with generated password + animation (fade)
        function updatePasswordWithAnimation(newPassword) {
            passwordDisplay.style.opacity = '0.4';
            setTimeout(() => {
                passwordDisplay.value = newPassword;
                passwordDisplay.style.opacity = '1';
                evaluateStrength(newPassword);
            }, 80);
        }

        function refreshPassword() {
            const pwd = generatePassword();
            updatePasswordWithAnimation(pwd);
        }

        // ---------- Strength evaluation (real-time) ----------
        function evaluateStrength(password) {
            const length = password.length;
            let variety = 0;
            if (/[A-Z]/.test(password)) variety++;
            if (/[a-z]/.test(password)) variety++;
            if (/[0-9]/.test(password)) variety++;
            if (/[^A-Za-z0-9]/.test(password)) variety++;

            let score = 0;
            // length factor
            if (length >= 12) score += 2;
            else if (length >= 8) score += 1;
            // variety
            score += variety * 1.5;
            
            let strengthLevel = 'weak';
            let percent = 25;
            let color = 'var(--weak)';

            if (score >= 5.5) {
                strengthLevel = 'strong';
                percent = 100;
                color = 'var(--strong)';
            } else if (score >= 3.5) {
                strengthLevel = 'medium';
                percent = 60;
                color = 'var(--medium)';
            } else {
                strengthLevel = 'weak';
                percent = 30;
                color = 'var(--weak)';
            }

            // extra tweak: if length > 20 and variety>=3 → push strong
            if (length >= 18 && variety >= 3) {
                strengthLevel = 'strong';
                percent = 100;
                color = 'var(--strong)';
            } else if (length < 6) {
                percent = 15;
                strengthLevel = 'weak';
            }

            strengthMeterFill.style.width = percent + '%';
            strengthMeterFill.style.background = color;
            strengthText.textContent = strengthLevel.toUpperCase();
            strengthText.style.color = color;
        }

        // Evaluate based on current password
        function evaluateCurrent() {
            evaluateStrength(passwordDisplay.value);
        }

        // ---------- Copy with toast feedback ----------
        function copyToClipboard() {
            const pwd = passwordDisplay.value;
            if (!pwd) return;
            
            navigator.clipboard?.writeText(pwd).then(() => {
                showToast('✓ Copied to clipboard');
            }).catch(() => {
                // fallback
                const textArea = document.createElement('textarea');
                textArea.value = pwd;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('✓ Copied!');
            });
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1800);
        }

        // ---------- Theme (Dark/Light) with persistence ----------
        function setTheme(isDark) {
            if (isDark) {
                body.classList.add('dark');
                themeToggle.querySelector('span').textContent = '☀️';
                localStorage.setItem('vaultkey-theme', 'dark');
            } else {
                body.classList.remove('dark');
                themeToggle.querySelector('span').textContent = '🌙';
                localStorage.setItem('vaultkey-theme', 'light');
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('vaultkey-theme');
            if (saved === 'dark') setTheme(true);
            else if (saved === 'light') setTheme(false);
            // default light
        }

        themeToggle.addEventListener('click', () => {
            setTheme(!body.classList.contains('dark'));
        });

        // ---------- Sync UI & Event listeners ----------
        function updateLengthLabel() {
            lengthValue.textContent = lengthSlider.value;
        }

        // Slider input
        lengthSlider.addEventListener('input', () => {
            updateLengthLabel();
            // re-evaluate strength based on current password (does not auto regenerate)
            evaluateCurrent();
        });

        // Toggle changes: regenerate automatically? better: re-evaluate strength, but keep password unless regenerate.
        // we want smooth: when toggles change, we regenerate (better UX). BUT optional: we can regenerate only on button.
        // For premium feel: auto-regenerate on toggle change? we'll listen on generate button only, but toggles also trigger a strength update.
        const toggleInputs = [includeUppercase, includeLowercase, includeNumbers, includeSymbols];
        toggleInputs.forEach(toggle => {
            toggle.addEventListener('change', () => {
                enforceMinimumOne();
                // Re-evaluate strength of current password (even if not regenerated)
                evaluateCurrent();
                // but we also can regenerate? We'll let user decide, but many generators auto-gen. 
                // To align with "real-time feedback", we'll regenerate on toggle change.
                refreshPassword();
            });
        });

        // Generate main button
        generateBtn.addEventListener('click', (e) => {
            e.preventDefault();
            refreshPassword();
        });

        // Regenerate icon button
        regenerateBtn.addEventListener('click', (e) => {
            e.preventDefault();
            refreshPassword();
        });

        // Copy button
        copyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            copyToClipboard();
        });

        // Additional: when slider changes, regenerate? we'll make it optional: better let generate button handle.
        // but many expect slider to regenerate — we'll regenerate on slider change for realtime.
        lengthSlider.addEventListener('change', () => {
            refreshPassword();
        });
        // also on input? we can throttle, but simplicity: use change. But for "smooth" we also regenerate on input (with debounce)
        let sliderTimeout;
        lengthSlider.addEventListener('input', () => {
            updateLengthLabel();
            evaluateCurrent();
            if (sliderTimeout) clearTimeout(sliderTimeout);
            sliderTimeout = setTimeout(() => {
                refreshPassword();
            }, 40);
        });

        // On page load, generate initial password
        function initialize() {
            updateLengthLabel();
            const initialPassword = generatePassword();
            passwordDisplay.value = initialPassword;
            evaluateStrength(initialPassword);
            initTheme();
        }

        initialize();

        // Micro-interaction: button press animation via CSS already.

        // Add small improvement: re-evaluate on window focus? not needed.

        // Additional: real-time password visibility toggle? optional but we skip for brevity.
        // Ensure we have no empty selection:
        window.addEventListener('load', () => {
            // force lowercase if all off
            if (!atLeastOneChecked()) includeLowercase.checked = true;
        });

        // Copy feedback + toast.
        // All set.
    })();
</script>
<!-- small extra style for toast positioning and responsiveness -->
</body>
</html>
