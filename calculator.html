<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Calculator</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  transition: 0.4s;
}

body.light {
  background: linear-gradient(135deg, #e2e8f0, #cbd5f5);
}

.calculator {
  width: 340px;
  padding: 20px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  color: white;
  transition: 0.4s;
}

body.light .calculator {
  background: rgba(255,255,255,0.7);
  color: #111;
}

.top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.icon-btn {
  border: none;
  padding: 10px;
  border-radius: 50%;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  transition: 0.3s;
}

.icon-btn:hover {
  transform: scale(1.1);
}

.display {
  text-align: right;
  margin-bottom: 20px;
}

.prev {
  opacity: 0.6;
}

.current {
  font-size: 38px;
  font-weight: bold;
  transition: 0.2s;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 12px;
}

button {
  padding: 18px;
  font-size: 18px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.2s;
}

button:active {
  transform: scale(0.9);
}

/* ripple */
button span {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transform: scale(0);
  animation: ripple 0.6s linear;
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

.btn {
  background: linear-gradient(145deg, #334155, #1e293b);
  color: white;
}

.op {
  background: linear-gradient(145deg, #f97316, #fb923c);
  color: white;
}

body.light .btn {
  background: linear-gradient(145deg, #e2e8f0, #cbd5f5);
  color: black;
}

body.light .op {
  background: linear-gradient(145deg, #7c3aed, #6366f1);
}

.history {
  margin-top: 15px;
  max-height: 150px;
  overflow-y: auto;
  display: none;
}

.history div {
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 5px;
  cursor: pointer;
  transition: 0.2s;
}

.history div:hover {
  background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="calculator">
  <div class="top">
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
    <button class="icon-btn" onclick="toggleHistory()">🕒</button>
  </div>

  <div class="display">
    <div class="prev" id="prev"></div>
    <div class="current" id="current">0</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="history" id="history"></div>
</div>

<script>
let input = "0";
let prev = "";
let history = JSON.parse(localStorage.getItem("calcHistory")) || [];

const currentEl = document.getElementById("current");
const prevEl = document.getElementById("prev");
const historyEl = document.getElementById("history");

const layout = [
 ['C','⌫','%','/'],
 ['7','8','9','*'],
 ['4','5','6','-'],
 ['1','2','3','+'],
 ['0','.','=','']
];

function createButtons() {
  const grid = document.getElementById("grid");
  layout.forEach(row => {
    row.forEach(val => {
      if (!val) {
        grid.appendChild(document.createElement("div"));
        return;
      }
      const btn = document.createElement("button");
      btn.innerText = val;
      btn.className = ['+','-','*','/','=','%'].includes(val) ? 'op' : 'btn';

      btn.onclick = (e) => {
        ripple(e);
        handle(val);
      };

      grid.appendChild(btn);
    });
  });
}

function ripple(e) {
  const circle = document.createElement("span");
  const rect = e.target.getBoundingClientRect();
  circle.style.left = e.clientX - rect.left + "px";
  circle.style.top = e.clientY - rect.top + "px";
  e.target.appendChild(circle);
  setTimeout(() => circle.remove(), 600);
}

function handle(val) {
  if (val === "C") {
    input = "0"; prev = "";
  } else if (val === "⌫") {
    input = input.length > 1 ? input.slice(0,-1) : "0";
  } else if (val === "=") {
    try {
      let exp = prev + input;
      let res = eval(exp);
      history.push({exp,res});
      history = history.slice(-10);
      localStorage.setItem("calcHistory", JSON.stringify(history));
      input = res.toString();
      prev = "";
      renderHistory();
    } catch {
      input = "Error";
    }
  } else if (['+','-','*','/'].includes(val)) {
    prev = input + val;
    input = "0";
  } else {
    input = input === "0" ? val : input + val;
  }
  update();
}

function update() {
  currentEl.innerText = input;
  prevEl.innerText = prev;
}

function toggleTheme() {
  document.body.classList.toggle("light");
}

function toggleHistory() {
  historyEl.style.display = historyEl.style.display === "block" ? "none" : "block";
}

function renderHistory() {
  historyEl.innerHTML = "";
  history.forEach(h => {
    const div = document.createElement("div");
    div.innerText = `${h.exp} = ${h.res}`;
    div.onclick = () => {
      input = h.res.toString();
      update();
    };
    historyEl.appendChild(div);
  });
}

document.addEventListener("keydown", e => {
  if (!isNaN(e.key)) handle(e.key);
  else if (['+','-','*','/'].includes(e.key)) handle(e.key);
  else if (e.key === "Enter") handle('=');
  else if (e.key === "Backspace") handle('⌫');
  else if (e.key === "Escape") handle('C');
});

createButtons();
renderHistory();
update();
</script>

</body>
</html>
