
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        :root {
            --bg-dark: #020617;
            --bg-light: #f8fafc;
            --accent-win: #22c55e;
            --accent-lose: #ef4444;
            --accent-neutral: #38bdf8;
            --accent-light: #6366f1;
            --text-dark: #e2e8f0;
            --text-light: #1e293b;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text-dark);
            transition: background 0.5s, color 0.5s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
        }

        .theme-toggle {
            background: var(--accent-light);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }

        .scoreboard {
            font-size: 1.5rem;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
        }

        .arena {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 40px 0;
            min-height: 200px;
        }

        .player, .ai {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .choice {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent-light);
            color: white;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .choice:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-light);
        }

        .choice:active {
            transform: scale(0.95);
        }

        .result {
            font-size: 2rem;
            margin: 20px 0;
            min-height: 60px;
        }

        .reset {
            background: var(--accent-neutral);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
        }

        .thinking {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .win {
            animation: winGlow 1s;
        }

        @keyframes winGlow {
            0% { box-shadow: 0 0 0 var(--accent-win); }
            50% { box-shadow: 0 0 20px var(--accent-win); }
            100% { box-shadow: 0 0 0 var(--accent-win); }
        }

        .lose {
            animation: loseShake 0.5s;
        }

        @keyframes loseShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .light-mode {
            --bg-dark: #f8fafc;
            --text-dark: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Rock Paper Scissors</h1>
            <button class="theme-toggle">Dark Mode</button>
        </header>
        <div class="scoreboard">
            <div>Player: <span id="player-score">0</span></div>
            <div>AI: <span id="ai-score">0</span></div>
        </div>
        <div class="arena">
            <div class="player" id="player-choice"></div>
            <div class="ai" id="ai-choice"></div>
        </div>
        <div class="result" id="result"></div>
        <div class="choices">
            <button class="choice" data-choice="✊">✊</button>
            <button class="choice" data-choice="✋">✋</button>
            <button class="choice" data-choice="✌️">✌️</button>
        </div>
        <button class="reset" id="reset">Reset Game</button>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playerChoiceElement = document.getElementById('player-choice');
            const aiChoiceElement = document.getElementById('ai-choice');
            const resultElement = document.getElementById('result');
            const playerScoreElement = document.getElementById('player-score');
            const aiScoreElement = document.getElementById('ai-score');
            const choices = document.querySelectorAll('.choice');
            const resetButton = document.getElementById('reset');
            const themeToggle = document.querySelector('.theme-toggle');

            let playerScore = 0;
            let aiScore = 0;

            // Theme toggle
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                themeToggle.textContent = document.body.classList.contains('light-mode') ? 'Light Mode' : 'Dark Mode';
            });

            // Game logic
            choices.forEach(choice => {
                choice.addEventListener('click', () => {
                    const playerChoice = choice.dataset.choice;
                    playerChoiceElement.textContent = playerChoice;
                    aiChoiceElement.textContent = '';
                    aiChoiceElement.classList.add('thinking');
                    resultElement.textContent = '';

                    setTimeout(() => {
                        const aiChoice = getAIChoice();
                        aiChoiceElement.textContent = aiChoice;
                        aiChoiceElement.classList.remove('thinking');

                        const result = determineWinner(playerChoice, aiChoice);
                        displayResult(result);
                    }, 1500);
                });
            });

            function getAIChoice() {
                const options = ['✊', '✋', '✌️'];
                return options[Math.floor(Math.random() * options.length)];
            }

            function determineWinner(player, ai) {
                if (player === ai) return 'draw';
                if (
                    (player === '✊' && ai === '✌️') ||
                    (player === '✋' && ai === '✊') ||
                    (player === '✌️' && ai === '✋')
                ) {
                    return 'win';
                }
                return 'lose';
            }

            function displayResult(result) {
                if (result === 'win') {
                    resultElement.textContent = 'You Win!';
                    resultElement.style.color = 'var(--accent-win)';
                    playerChoiceElement.classList.add('win');
                    playerScore++;
                } else if (result === 'lose') {
                    resultElement.textContent = 'You Lose!';
                    resultElement.style.color = 'var(--accent-lose)';
                    aiChoiceElement.classList.add('lose');
                    aiScore++;
                } else {
                    resultElement.textContent = 'Draw!';
                    resultElement.style.color = 'var(--accent-neutral)';
                }

                playerScoreElement.textContent = playerScore;
                aiScoreElement.textContent = aiScore;

                setTimeout(() => {
                    playerChoiceElement.classList.remove('win');
                    aiChoiceElement.classList.remove('lose');
                }, 1000);
            }

            resetButton.addEventListener('click', () => {
                playerScore = 0;
                aiScore = 0;
                playerScoreElement.textContent = playerScore;
                aiScoreElement.textContent = aiScore;
                playerChoiceElement.textContent = '';
                aiChoiceElement.textContent = '';
                resultElement.textContent = '';
            });
        });
    </script>
</body>
</html>
